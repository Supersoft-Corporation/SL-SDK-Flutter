name: softlink_flutter
description: "SoftLink Flutter SDK for deep linking, deferred deep linking, and install attribution."
version: 0.0.8
homepage: https://github.com/Supersoft-Corporation/SL-SDK-Flutter
repository: https://github.com/Supersoft-Corporation/SL-SDK-Flutter

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  device_info_plus: ^13.2.0
  get_storage: ^2.1.1
  app_links: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.supersoft.softlink_flutter
        pluginClass: SoftlinkFlutterPlugin
      ios:
        pluginClass: SoftlinkFlutterPlugin